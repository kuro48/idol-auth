services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: idol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: idol_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idol -d idol_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    command: migrate sql -e --yes
    environment:
      DSN: postgres://idol:${POSTGRES_PASSWORD}@postgres:5432/idol_auth?sslmode=disable&search_path=kratos
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  kratos:
    image: oryd/kratos:v26.2.0
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - ./deploy/kratos:/etc/config/kratos
    environment:
      DSN: postgres://idol:${POSTGRES_PASSWORD}@postgres:5432/idol_auth?sslmode=disable&search_path=kratos
      COURIER_SMTP_CONNECTION_URI: smtp://mailpit:1025/?disable_starttls=true
    ports:
      - "4433:4433"
      - "4434:4434"
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v26.2.0
    command: migrate sql -e --yes
    environment:
      DSN: postgres://idol:${POSTGRES_PASSWORD}@postgres:5432/idol_auth?sslmode=disable&search_path=hydra
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  hydra:
    image: oryd/hydra:v26.2.0
    command: serve all --dev
    environment:
      DSN: postgres://idol:${POSTGRES_PASSWORD}@postgres:5432/idol_auth?sslmode=disable&search_path=hydra
      SECRETS_SYSTEM: ${HYDRA_SYSTEM_SECRET}
      URLS_SELF_ISSUER: http://localhost:4444
      URLS_CONSENT: http://localhost:8080/v1/auth/consent
      URLS_LOGIN: http://localhost:8080/v1/auth/login
      URLS_LOGOUT: http://localhost:8080/v1/auth/logout
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3002}
      LOG_LEVEL: debug
    ports:
      - "4444:4444"
      - "4445:4445"
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgres://idol:${POSTGRES_PASSWORD}@postgres:5432/idol_auth?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  app:
    build:
      context: .
      target: app
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgres://idol:${POSTGRES_PASSWORD}@postgres:5432/idol_auth?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_ADMIN_URL: http://kratos:4434
      HYDRA_PUBLIC_URL: http://hydra:4444
      HYDRA_ADMIN_URL: http://hydra:4445
      KRATOS_BROWSER_URL: ${KRATOS_BROWSER_URL:-http://localhost:4433}
      HYDRA_BROWSER_URL: ${HYDRA_BROWSER_URL:-http://localhost:4444}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN}
      SESSION_COOKIE_SECURE: "false"
      TRUSTED_PROXIES: ""
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kratos:
        condition: service_started
      hydra:
        condition: service_started
    restart: unless-stopped

  demo:
    build:
      context: .
      target: demo
    environment:
      DEMO_PORT: 3001
      DEMO_APP_URL: ${DEMO_APP_URL:-http://localhost:3002}
      DEMO_AUTH_INTERNAL_URL: http://app:8080
      DEMO_KRATOS_PUBLIC_URL: http://kratos:4433
      DEMO_KRATOS_BROWSER_URL: http://localhost:4433
      DEMO_HYDRA_PUBLIC_URL: http://hydra:4444
      DEMO_HYDRA_BROWSER_URL: http://localhost:4444
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN}
    ports:
      - "${DEMO_PORT:-3002}:3001"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
