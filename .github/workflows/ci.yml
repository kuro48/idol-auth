name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build / Test / Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build
        run: nix develop --command go build ./...

      - name: Test (race detector)
        run: nix develop --command go test -race ./...

      - name: govulncheck
        run: nix develop --command go run golang.org/x/vuln/cmd/govulncheck@latest ./...
