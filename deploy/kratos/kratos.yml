version: v0.13.0

dsn: memory

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3002
        - http://localhost:8080
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Session-Token
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3002/

  allowed_return_urls:
    - http://localhost:3002
    - http://localhost:8080

  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: true
        min_password_length: 8
        identifier_similarity_check_enabled: true
    totp:
      enabled: true
      config:
        issuer: idol-auth
    lookup_secret:
      enabled: false
    link:
      enabled: false
    code:
      enabled: true

  flows:
    registration:
      enabled: true
      ui_url: http://localhost:3002/registration
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
    login:
      ui_url: http://localhost:3002/login
      lifespan: 10m
    logout:
      after:
        default_browser_return_url: http://localhost:3002/login
    settings:
      ui_url: http://localhost:3002/settings
      required_aal: highest_available
    recovery:
      enabled: true
      ui_url: http://localhost:3002/recovery
      use: code
    verification:
      enabled: true
      ui_url: http://localhost:3002/verification
      use: code
      after:
        default_browser_return_url: http://localhost:3002/

session:
  lifespan: 24h
  cookie:
    persistent: true
    same_site: Lax
    domain: localhost

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    from_address: noreply@idol-auth.local
    from_name: idol-auth

log:
  level: debug
  format: text
  leak_sensitive_values: false
